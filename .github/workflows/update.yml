name: Update Border Data

on:
  schedule:
    - cron: '30 1 * * 1'  # 每周一 9:30 北京时间
  workflow_dispatch:  # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Download and update data
      run: |
        python3 << 'EOF'
import csv
import json
import urllib.request
from datetime import datetime

# 下载最新数据
url = "https://data.gov.hk/tc-data/dataset/hk-immd-set5-statistics-daily-passenger-traffic/resource/b341ea9a-7a34-4e33-95f7-5b297845ef43/download/transport_immigration_clearance_entry_exit.csv"
print("正在下载数据...")
urllib.request.urlretrieve(url, '/tmp/data.csv')

# 读取现有数据
with open('data.json', 'r', encoding='utf-8') as f:
    data = json.load(f)

print(f"现有数据: {len(data)} 天")

# 解析CSV
new_count = 0
with open('/tmp/data.csv', 'r', encoding='utf-8-sig') as f:
    reader = csv.DictReader(f)
    for row in reader:
        date_str = row['日期']
        try:
            dt = datetime.strptime(date_str, '%d-%m-%Y')
            key = dt.strftime('%Y-%m-%d')
            
            if key in data:  # 已存在则跳过
                continue
            
            direction = row['入境 / 出境']
            hk = int(row['香港居民'] or 0)
            mainland = int(row['內地訪客'] or 0)
            other = int(row['其他訪客'] or 0)
            total = int(row['總計'] or 0)
            
            if key not in data:
                data[key] = {
                    'inbound': {'hk': 0, 'mainland': 0, 'other': 0, 'total': 0},
                    'outbound': {'hk': 0, 'mainland': 0, 'other': 0, 'total': 0}
                }
            
            if direction == '入境':
                data[key]['inbound']['hk'] += hk
                data[key]['inbound']['mainland'] += mainland
                data[key]['inbound']['other'] += other
                data[key]['inbound']['total'] += total
            else:
                data[key]['outbound']['hk'] += hk
                data[key]['outbound']['mainland'] += mainland
                data[key]['outbound']['other'] += other
                data[key]['outbound']['total'] += total
            
            new_count += 1
        except Exception as e:
            continue

# 保存
with open('data.json', 'w', encoding='utf-8') as f:
    json.dump(data, f, ensure_ascii=False, separators=(',', ':'))

print(f"数据更新完成！新增 {new_count} 天数据，总计 {len(data)} 天")
EOF

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        git diff --cached --quiet || (git commit -m "Update border data - $(date +'%Y-%m-%d')" && git push)
