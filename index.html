<!DOCTYPE html>  
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>香港出入境数据统计系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:#f5f7fa;color:#2c3e50;line-height:1.6}
.container{max-width:1800px;margin:0 auto;padding:20px}
header{background:linear-gradient(to right,#d7f4d7,#a6e1fa);padding:25px;border-radius:0;margin-bottom:30px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
header h1{font-size:32px;margin-bottom:8px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-weight:700;color:#000}
nav{margin-top:15px;display:flex;gap:15px}
nav button{background:rgba(255,255,255,0.4);color:#1e8449;border:2px solid transparent;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;margin:0 6px}
nav button:hover{background:rgba(255,255,255,0.6)}nav button.active{background:#fff;color:#27ae60;border:2px solid #27ae60}
main{background:#fff;padding:30px;border-radius:10px;overflow-x:auto}
.section{margin-bottom:40px}
.section h3{font-size:20px;color:#34495e;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #3498db}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#2c3e50;color:#fff;padding:10px 6px;border:1px solid #34495e;text-align:center;font-weight:600;white-space:nowrap}
td{padding:8px 6px;border:1px solid #ddd;text-align:right;vertical-align:top}
td:first-child{text-align:left;font-weight:500;white-space:nowrap}
tr:nth-child(even){background:#f8f9fa}
tr:hover{background:#ecf0f1}
.total-row{background:#d5dbdb!important;font-weight:800;font-size:1.05em}
.separator-row td{border:0;padding:0;height:15px;background:#fff!important}
.positive{color:#27ae60;font-weight:500}
.negative{color:#e74c3c;font-weight:500}
.neutral{color:#7f8c8d}
.sub-text{font-size:10px;display:block;margin-top:2px}
.charts-row{display:flex;flex-direction:column;gap:20px;margin-top:20px}
.chart-box{height:400px}
.chart-box{background:#fff;padding:20px;border-radius:8px;border:1px solid #e0e0e0}
.chart{width:100%;height:400px}
#summary{background:#f8f9fa;padding:25px;border-radius:8px;font-size:16px;line-height:2;white-space:pre-line}
.controls{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.controls label{font-weight:500}
.controls input,.controls select{padding:8px 12px;border:1px solid #ddd;border-radius:5px}
.controls button{background:#3498db;color:#fff;border:0;padding:10px 20px;border-radius:5px;cursor:pointer}
.loading{text-align:center;color:#7f8c8d;padding:40px}
footer{margin-top:30px;padding:20px;text-align:center;color:#7f8c8d;font-size:14px}
@media(max-width:768px){.charts-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<header>
<h1 class="title-main">香港出入境数据统计系统</h1><p class="title-sub">数据来源：香港入境事务处 | 数据范围：<span id="dataRange">2021-01-01 至 2026-05-20</span></p>
<p>数据来源：香港入境事务处 | 数据范围：<span id="dataRange">2021-01-01 至 2026-05-20</span></p>
<nav>
<button class="active" onclick="showPage('current')">最新周报</button>
<button onclick="showPage('history')">历史查询</button>
<button onclick="showPage('prediction')">数据预测</button>
</nav>
</header>
<main id="content"><div class="loading">加载中...</div></main>
<footer><p>数据来源：香港入境事务处</p></footer>
</div>
<script>
let DATA = {};
// 等待DOM解析完成后再加载数据
// 简单粗暴：每500ms检查一次，DATA好了就渲染，最多10次
var retries = 0;
function tryRender() {
  retries++;
  var content = document.getElementById('content');
  if (Object.keys(DATA).length > 0) {
    try {
      var dates = Object.keys(DATA).sort();
      (document.getElementById('dataRange') || {}).textContent = dates[0] + ' 至 ' + dates[dates.length - 1];
      content.innerHTML = genReport();
    } catch(e) {
      content.innerHTML = '<div class="loading">渲染错误：' + e.message + '</div>';
      console.error(e);
    }
  } else if (retries < 10) {
    setTimeout(tryRender, 500);
  } else {
    content.innerHTML = '<div class="loading">数据加载超时<br><a href="javascript:location.reload()">刷新</a></div>';
  }
}

// 先尝试加载一次，失败则用轮询
fetch('data.json')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    DATA = d;
    tryRender();
  })
  .catch(function() { tryRender(); });

// 工具函数
function fmtD(s){var d=new Date(s);return(d.getMonth()+1)+'/'+d.getDate()}
function fmtFD(s){var d=new Date(s);return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')}
function fmtN(n){return(n/10000).toFixed(1)}
function fmtP(n){return(n>0?'+':'')+n.toFixed(2)+'%'}
function clsC(n){return n>0?'positive':n<0?'negative':'neutral'}
function dts(d){var y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();return y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0')}
function avg(a){if(!a||!a.length)return 0;var s=0;for(var i=0;i<a.length;i++)s+=a[i];return s/a.length}
function chg(c,p){
  if(!p||p===0)return 0;
  return(c-p)/p*100;
}

// 计算指定年份ISO周的平均值
function calcWeekAvg(year, week, cat, dir){
  var mon = getISOWeekMonday(year, week);
  var dates = [];
  for(var i=0;i<7;i++){
    var d = new Date(mon);
    d.setDate(d.getDate() + i);
    dates.push(dts(d));
  }
  var total = 0, count = 0;
  dates.forEach(function(d){
    if(DATA[d] && DATA[d][dir] && DATA[d][dir][cat] !== undefined){
      total += DATA[d][dir][cat];
      count++;
    }
  });
  return count > 0 ? total / count : 0;
}

// 计算指定年的周对比：本周 vs 上周
function calcWeekChg(year, week, cat, dir){
  var currentAvg = calcWeekAvg(year, week, cat, dir);
  // 对比上周（同一年度内的上周）
  var prevWeek = week - 1;
  var prevYear = year;
  if(prevWeek < 1){
    prevYear = year - 1;
    prevWeek = 52;
  }
  var prevAvg = calcWeekAvg(prevYear, prevWeek, cat, dir);
  return chg(currentAvg, prevAvg);
}

// 获取指定年月的ISO周数
function getISOWeekNum(dateStr){
  var d=new Date(dateStr);
  var year=d.getFullYear();
  var jan4=new Date(year,0,4);
  var jan4Day=jan4.getDay()||7;
  var week1Monday=new Date(jan4);week1Monday.setDate(jan4.getDate()-(jan4Day-1));
  var days=Math.floor((d-week1Monday)/(86400000*7));
  return days+1;
}

// 获取某年某ISO周的对应对周（上周）
function getPrevISOWeek(year,week){
  if(week<=1){year--;week=52;}
  else{week--;}
  return{year:year,week:week};
}

function weekRange(dt){
  var d=new Date(dt),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  var mon=new Date(d.setDate(diff)),sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{start:mon,end:sun}
}

// 获取ISO周数（与Python一致）
function getISOWeek(dateStr){
  var d=new Date(dateStr);
  var dayNum = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - dayNum);
  var yearStart = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// 根据ISO年和周数获取周一日期（修正版）
function getISOWeekMonday(year, week) {
  // 1月4日一定在第1周
  var jan4 = new Date(year, 0, 4);
  // 1月4日所在周的周一
  var jan4Day = jan4.getDay() || 7;
  var week1Monday = new Date(jan4);
  week1Monday.setDate(jan4.getDate() - (jan4Day - 1));
  // 目标周的周一
  var targetMonday = new Date(week1Monday);
  targetMonday.setDate(week1Monday.getDate() + (week - 1) * 7);
  return targetMonday;
}

function weekDates(sd){
  var r=[],d=new Date(sd);
  for(var i=0;i<7;i++){var t=new Date(d);t.setDate(d.getDate()+i);r.push(dts(t))}
  return r
}

function weekStats(dates){
  var s={inbound:{hk:[],mainland:[],other:[],total:[]},outbound:{hk:[],mainland:[],other:[],total:[]}};
  dates.forEach(function(d){
    if(DATA[d]){
      var day=DATA[d];
      ['inbound','outbound'].forEach(function(dir){
        if(day[dir]){
          s[dir].hk.push(day[dir].hk||0);
          s[dir].mainland.push(day[dir].mainland||0);
          s[dir].other.push(day[dir].other||0);
          s[dir].total.push(day[dir].total||0)
        }
      })
    }
  });
  return s
}

function genReport(){
  // 当前统计周：上周（2026-05-11至2026-05-17）
  var today=new Date();
  today.setDate(today.getDate()-7);
  var wk=weekRange(today);
  var dates0=weekDates(dts(wk.start)); // 本周（2026-05-11至05-17）
  
  // T-1周（2026-05-04至05-10）
  var d1=new Date(wk.start);d1.setDate(d1.getDate()-7);
  var dates1=weekDates(dts(d1));
  
  // T-2周（2026-04-27至05-03）
  var d2=new Date(d1);d2.setDate(d2.getDate()-7);
  var dates2=weekDates(dts(d2));
  
  // T-3周（2026-04-20至04-26）- 周一到周日
  var d3=new Date(d2);d3.setDate(d3.getDate()-7);
  var dates3=weekDates(dts(d3));
  
  // 上年同期：ISO周对齐
  // 2026-05-11是第20周周一
  var isoWk=getISOWeek(dts(wk.start));
  var lastYear=wk.start.getFullYear()-1;
  var lyMon=getISOWeekMonday(lastYear,isoWk); // 2025-05-12（周一）
  var lyDates=weekDates(dts(lyMon)); // 2025-05-12至05-18
  
  // 上年同周的上上周（用于周对比）
  var lyPrev=new Date(lyMon);lyPrev.setDate(lyPrev.getDate()-7);
  var lyPrevDates=weekDates(dts(lyPrev));
  
  // 上年同周的T+1,T+2,T+3
  var lyNext1=new Date(lyMon);lyNext1.setDate(lyNext1.getDate()+7);
  var lyDates1=weekDates(dts(lyNext1));
  var lyNext2=new Date(lyNext1);lyNext2.setDate(lyNext2.getDate()+7);
  var lyDates2=weekDates(dts(lyNext2));
  var lyNext3=new Date(lyNext2);lyNext3.setDate(lyNext3.getDate()+7);
  var lyDates3=weekDates(dts(lyNext3));
  
  // 统计数据
  var s0=weekStats(dates0);
  var s1=weekStats(dates1);
  var s2=weekStats(dates2);
  var s3=weekStats(dates3);
  var ls=weekStats(lyDates);
  var lps=weekStats(lyPrevDates);
  var ls1=weekStats(lyDates1);
  var ls2=weekStats(lyDates2);
  var ls3=weekStats(lyDates3);
  
  var cats=['hk','mainland','other'];
  var catN={hk:'港人',mainland:'内地旅客',other:'外国旅客'};
  
  var h='<div class="section"><h3>出入境旅客流量统计表 ('+dts(wk.start)+' 至 '+dts(wk.end)+')</h3>';
  h+='<table><thead><tr>';
  h+='<th>类别</th><th>上周日均(万)</th><th>周对比</th>';
  dates0.forEach(function(d){h+='<th>'+fmtFD(d)+'</th>'});
  h+='<th>T0周<br>'+fmtFD(wk.start)+'</th>';
  h+='<th>T-1周<br>'+fmtFD(d1)+'</th>';
  h+='<th>T-2周<br>'+fmtFD(d2)+'</th>';
  h+='<th>T-3周<br>'+fmtFD(d3)+'</th>';
  h+='</tr></thead><tbody>';
  
  // 今年数据层
  ['inbound','outbound'].forEach(function(dir){
    var dn=dir==='inbound'?'南下':'北上';
    var tn=dir==='inbound'?'入境合计':'出境合计';
    
    // 预先计算ISO周对齐的周对比
    var thisYear=wk.start.getFullYear();
    var thisWeek=getISOWeek(dts(wk.start));
    
    cats.forEach(function(cat){
      var a0=avg(s0[dir][cat]);
      var a1=avg(s1[dir][cat]);
      var a2=avg(s2[dir][cat]);
      var a3=avg(s3[dir][cat]);
      var c=calcWeekChg(thisYear,thisWeek,cat,dir);
      
      h+='<tr><td>'+catN[cat]+dn+'</td>';
      h+='<td>'+fmtN(a0)+'</td>';
      h+='<td class="'+clsC(c)+'">'+fmtP(c)+'</td>';
      
      dates0.forEach(function(d,i){
        var v=s0[dir][cat][i]||0;
        var pv=s1[dir][cat][i]||0;
        var dc=chg(v,pv);
        h+='<td>'+fmtN(v)+'<span class="sub-text '+clsC(dc)+'">'+fmtP(dc)+'</span></td>';
      });
      
      h+='<td>'+fmtN(a0)+'</td>';
      h+='<td>'+fmtN(a1)+'</td>';
      h+='<td>'+fmtN(a2)+'</td>';
      h+='<td>'+fmtN(a3)+'</td>';
      h+='</tr>';
    });
    
    // 合计行
    var ta0=avg(s0[dir].total);
    var ta1=avg(s1[dir].total);
    var ta2=avg(s2[dir].total);
    var ta3=avg(s3[dir].total);
    var tc=calcWeekChg(thisYear,thisWeek,'total',dir);
    
    h+='<tr class="total-row"><td>'+tn+'</td>';
    h+='<td>'+fmtN(ta0)+'</td>';
    h+='<td class="'+clsC(tc)+'">'+fmtP(tc)+'</td>';
    
    dates0.forEach(function(d,i){
      var v=s0[dir].total[i]||0;
      var pv=s1[dir].total[i]||0;
      var dc=chg(v,pv);
      h+='<td>'+fmtN(v)+'<span class="sub-text '+clsC(dc)+'">'+fmtP(dc)+'</span></td>';
    });
    
    h+='<td>'+fmtN(ta0)+'</td>';
    h+='<td>'+fmtN(ta1)+'</td>';
    h+='<td>'+fmtN(ta2)+'</td>';
    h+='<td>'+fmtN(ta3)+'</td>';
    h+='</tr>';
  });
  
  // 分隔
  h+='<tr class="separator-row"><td colspan="14"></td></tr>';
  
  // 上年同期数据层
  var thisYear=wk.start.getFullYear();
  var thisWeek=getISOWeek(dts(wk.start));
  var lyYear=lastYear;
  var lyWeek=thisWeek;
  
  h+='<thead><tr>';
  h+='<th colspan="14" style="text-align:center;background:#34495e;font-size:14px">去年同期（ISO周对齐：'+dts(lyMon)+' 至 '+dts(new Date(lyMon.getTime()+6*86400000))+'）</th>';
  h+='</tr></thead>';
  h+='<thead><tr>';
  h+='<th>类别</th><th>当周日均(万)</th><th>同比</th>';
  lyDates.forEach(function(d){h+='<th>'+fmtFD(d)+'</th>'});
  h+='<th>当前周日均</th>';
  h+='<th>T+1周<br>'+fmtFD(lyNext1)+'</th>';
  h+='<th>T+2周<br>'+fmtFD(lyNext2)+'</th>';
  h+='<th>T+3周<br>'+fmtFD(lyNext3)+'</th>';
  h+='</tr></thead><tbody>';
  
  ['inbound','outbound'].forEach(function(dir){
    var dn=dir==='inbound'?'南下':'北上';
    var tn=dir==='inbound'?'入境合计':'出境合计';
    
    cats.forEach(function(cat){
      var la=avg(ls[dir][cat]);
      var lpa=avg(lps[dir][cat]);
      var currAvg=calcWeekAvg(thisYear,thisWeek,cat,dir);var lyAvg=calcWeekAvg(lyYear,lyWeek,cat,dir);var lc=chg(currAvg,lyAvg);
      
      h+='<tr style="color:#7f8c8d"><td>'+catN[cat]+dn+'</td>';
      h+='<td>'+fmtN(la)+'</td>';
      h+='<td class="'+clsC(lc)+'">'+fmtP(lc)+'</td>';
      
      lyDates.forEach(function(d,i){
        h+='<td>'+fmtN(ls[dir][cat][i]||0)+'</td>';
      });
      
      h+='<td>'+fmtN(la)+'</td>';
      h+='<td>'+fmtN(avg(ls1[dir][cat]))+'</td>';
      h+='<td>'+fmtN(avg(ls2[dir][cat]))+'</td>';
      h+='<td>'+fmtN(avg(ls3[dir][cat]))+'</td>';
      h+='</tr>';
    });
    
    // 合计行
    var lta=avg(ls[dir].total);
    var ltpa=avg(lps[dir].total);
    var currTotalAvg=calcWeekAvg(thisYear,thisWeek,'total',dir);var lyTotalAvg=calcWeekAvg(lyYear,lyWeek,'total',dir);var ltc=chg(currTotalAvg,lyTotalAvg);
    
    h+='<tr class="total-row" style="color:#7f8c8d"><td><strong>'+tn+'</strong></td>';
    h+='<td><strong>'+fmtN(lta)+'</strong></td>';
    h+='<td class="'+clsC(ltc)+'"><strong>'+fmtP(ltc)+'</strong></td>';
    
    lyDates.forEach(function(d,i){
      h+='<td><strong>'+fmtN(ls[dir].total[i]||0)+'</strong></td>';
    });
    
    h+='<td><strong>'+fmtN(lta)+'</strong></td>';
    h+='<td><strong>'+fmtN(avg(ls1[dir].total))+'</strong></td>';
    h+='<td><strong>'+fmtN(avg(ls2[dir].total))+'</strong></td>';
    h+='<td><strong>'+fmtN(avg(ls3[dir].total))+'</strong></td>';
    h+='</tr>';
  });
  
  h+='</tbody></table></div>';
  
  // 图表和小抄
  h+='<div class="section"><h3>年度对比趋势图</h3><div class="charts-row"><div class="chart-box"><h4>入境情况</h4><div id="ci" class="chart"></div></div></div><div class="charts-row"><div class="chart-box"><h4>出境情况</h4><div id="co" class="chart"></div></div></div></div>';
  h+='<div class="section"><h3>细节趋势图（近6周）</h3><div class="charts-row"><div class="chart-box"><h4>入境细节</h4><div id="cid" class="chart"></div></div></div><div class="charts-row"><div class="chart-box"><h4>出境细节</h4><div id="cod" class="chart"></div></div></div></div>';
  
  var ia=avg(s0.inbound.total),oa=avg(s0.outbound.total),ta=ia+oa;
  var ic=chg(ia,avg(s1.inbound.total)),oc=chg(oa,avg(s1.outbound.total));
  var iha=avg(s0.inbound.hk),ihc=chg(iha,avg(s1.inbound.hk));
  var ima=avg(s0.inbound.mainland),imc=chg(ima,avg(s1.inbound.mainland));
  var oha=avg(s0.outbound.hk),ohc=chg(oha,avg(s1.outbound.hk));
  var oma=avg(s0.outbound.mainland),omc=chg(oma,avg(s1.outbound.mainland));
  
  h+='<div class="section"><h3>周度数据汇报小抄</h3><div id="summary">出入境日均是 '+fmtN(ta)+' 万，整体'+((ic+oc)>0?'上升':'下降')+'\n\n一、入境（上周日均 '+fmtN(ia)+' 万，'+fmtP(ic)+'）\n港人南下：'+fmtN(iha)+' 万，周环比 '+fmtP(ihc)+'\n内地旅客南下：'+fmtN(ima)+' 万，周环比 '+fmtP(imc)+'\n\n二、出境（上周日均 '+fmtN(oa)+' 万，周环比 '+fmtP(oc)+'）\n港人北上：'+fmtN(oha)+' 万，周环比 '+fmtP(ohc)+'\n内地旅客北上：'+fmtN(oma)+' 万，周环比 '+fmtP(omc)+'</div></div>';
  
  setTimeout(drawCharts,100);
  return h;
}

function drawCharts(){
  var al=Object.keys(DATA).sort();
  var ly=al.filter(function(d){return d.startsWith('2025')});
  var cy=al.filter(function(d){return d.startsWith('2026')});
  
  // 格式化函数 - 保留两位小数
  function fmt2(n){return Math.round(n*100)/100;}
  
  // 年度对比图 - 入境（直线折线，统一颜色）
  var ci=echarts.init(document.getElementById('ci'));
  ci.setOption({title:{text:'入境情况年度对比',left:'center',textStyle:{fontSize:14}},tooltip:{trigger:'axis'},legend:{bottom:5,data:['港人(今年)','港人(去年)','内地旅客(今年)','内地旅客(去年)','总人数(今年)','总人数(去年)']},grid:{left:'3%',right:'4%',bottom:'15%',top:'15%',containLabel:true},xAxis:{type:'category',data:ly.map(fmtD),axisLabel:{interval:29}},yAxis:{type:'value',name:'万人次',max:80,interval:10},series:[

// 为指定周生成完整报表（用于历史查询）
function genReportForWeek(wk){
  var dates0=weekDates(dts(wk.start));

  // 上年同期ISO周对齐
  var isoWk=getISOWeek(dts(wk.start));
  var lastYear=wk.start.getFullYear()-1;
  var lyYear=lastYear;
  var lyWeek=isoWk;
  var lyMon=getISOWeekMonday(lastYear,isoWk);
  var lyDates=weekDates(dts(lyMon));
  var lyPrev=new Date(lyMon);lyPrev.setDate(lyPrev.getDate()-7);
  var lyPrevDates=weekDates(dts(lyPrev));
  var lyNext1=new Date(lyMon);lyNext1.setDate(lyNext1.getDate()+7);
  var lyDates1=weekDates(dts(lyNext1));
  var lyNext2=new Date(lyNext1);lyNext2.setDate(lyNext2.getDate()+7);
  var lyDates2=weekDates(dts(lyNext2));
  var lyNext3=new Date(lyNext2);lyNext3.setDate(lyNext3.getDate()+7);
  var lyDates3=weekDates(dts(lyNext3));
  
  var s0=weekStats(dates0),s1=weekStats(dates1),s2=weekStats(dates2),s3=weekStats(dates3);
  var ls=weekStats(lyDates),lps=weekStats(lyPrevDates),ls1=weekStats(lyDates1),ls2=weekStats(lyDates2),ls3=weekStats(lyDates3);
  
  var cats=['hk','mainland','other'];
  var catN={hk:'港人',mainland:'内地旅客',other:'外国旅客'};

  dates0.forEach(function(d){h+='<th>'+fmtFD(d)+'</th>'});
  h+='<th>T0周<br>'+fmtFD(wk.start)+'</th><th>T-1周<br>'+fmtFD(d1)+'</th><th>T-2周<br>'+fmtFD(d2)+'</th><th>T-3周<br>'+fmtFD(d3)+'</th></tr></thead><tbody>';
  
  var thisYear=wk.start.getFullYear();
  var thisWeek=getISOWeek(dts(wk.start));
  
  ['inbound','outbound'].forEach(function(dir){
    var dn=dir==='inbound'?'南下':'北上';
    var tn=dir==='inbound'?'入境合计':'出境合计';
    
    cats.forEach(function(cat){
      var a0=avg(s0[dir][cat]),a1=avg(s1[dir][cat]);

      dates0.forEach(function(d,i){

        var pv=s1[dir][cat][i]||0;
        var dc=chg(v,pv);
        h+='<td>'+fmtN(v)+'<span class="sub-text '+clsC(dc)+'">'+fmtP(dc)+'</span></td>';
      });
      h+='<td>'+fmtN(a0)+'</td><td>'+fmtN(a1)+'</td><td>'+fmtN(avg(s2[dir][cat]))+'</td><td>'+fmtN(avg(s3[dir][cat]))+'</td></tr>';
    });
    
    var ta0=avg(s0[dir].total),ta1=avg(s1[dir].total);
    var tc=calcWeekChg(thisYear,thisWeek,'total',dir);
    h+='<tr class="total-row"><td><strong>'+tn+'</strong></td><td><strong>'+fmtN(ta0)+'</strong></td><td class="'+clsC(tc)+'"><strong>'+fmtP(tc)+'</strong></td>';
    dates0.forEach(function(d,i){
      var v=s0[dir].total[i]||0;
      var pv=s1[dir].total[i]||0;

  ['inbound','outbound'].forEach(function(dir){
    var dn=dir==='inbound'?'南下':'北上';
    var tn=dir==='inbound'?'入境合计':'出境合计';
    
    cats.forEach(function(cat){
      var la=avg(ls[dir][cat]),lpa=avg(lps[dir][cat]);
      var currAvg=calcWeekAvg(thisYear,thisWeek,cat,dir);var lyAvg=calcWeekAvg(lyYear,lyWeek,cat,dir);var lc=chg(currAvg,lyAvg);

  h+='<div class="section"><h3>细节趋势图（近6周）</h3><div class="charts-row"><div class="chart-box"><h4>入境细节</h4><div id="cid" class="chart"></div></div></div><div class="charts-row"><div class="chart-box"><h4>出境细节</h4><div id="cod" class="chart"></div></div></div></div>';
  
  // 小抄

function genHistory(){
  return '<div class="section"><h3>历史数据查询</h3><div class="controls"><label>按周查询：</label><input type="date" id="qd" value="'+new Date().toISOString().split('T')[0]+'"><button onclick="qWeek()">查询</button></div><div class="controls"><label>自定义区间：</label><input type="date" id="sd"><span>至</span><input type="date" id="ed"><button onclick="qRange()">查询</button></div></div><div id="hr"></div>';
}

function qWeek(){
  var d=document.getElementById('qd').value;if(!d)return;
  var wk=weekRange(d);
  document.getElementById('hr').innerHTML=genReportForWeek(wk);
  setTimeout(drawChartsForWeek,100,wk);
}

function qRange(){
  var s=document.getElementById('sd').value,e=document.getElementById('ed').value;
  if(!s||!e){alert('请选择日期');return}
  var dates=[],d=new Date(s),ed=new Date(e);
  while(d<=ed){dates.push(dts(d));d.setDate(d.getDate()+1)}
  var st=weekStats(dates);
  document.getElementById('hr').innerHTML='<div class="section"><h3>查询结果 ('+s+' 至 '+e+')</h3><table><thead><tr><th>指标</th><th>入境(万)</th><th>出境(万)</th></tr></thead><tbody><tr><td>日均总流量</td><td>'+fmtN(avg(st.inbound.total))+'</td><td>'+fmtN(avg(st.outbound.total))+'</td></tr><tr><td>港人日均</td><td>'+fmtN(avg(st.inbound.hk))+'</td><td>'+fmtN(avg(st.outbound.hk))+'</td></tr><tr><td>内地旅客日均</td><td>'+fmtN(avg(st.inbound.mainland))+'</td><td>'+fmtN(avg(st.outbound.mainland))+'</td></tr><tr><td>外国旅客日均</td><td>'+fmtN(avg(st.inbound.other))+'</td><td>'+fmtN(avg(st.outbound.other))+'</td></tr></tbody></table></div>';
}

'2026-12-17,0,0,0,0,0|2026-12-18,0,0,0,0,0|2026-12-19,0,0,1,1,0|2026-12-20,0,0,1,1,0|2026-12-21,0,0,0,0,0|2026-12-22,0,0,0,0,0|2026-12-23,0,0,0,0,0|2026-12-24,0,0,0,0,0|2026-12-25,1,0,0,0,0|2026-12-26,0,0,1,1,0',
'2026-12-27,0,0,1,1,0|2026-12-28,0,0,0,0,0|2026-12-29,0,0,0,0,0|2026-12-30,0,0,0,0,0|2026-12-31,0,0,0,0,0'
].join('|');
d.split('|').forEach(function(r){var p=r.split(',');HOLIDAY[p[0]]={hh:+p[1],hc:+p[2],wh:+p[3],wc:+p[4],act:+p[5]};});
})();

// ===== 天气 PSR → mm =====
var PSR_MM={'Low':1,'Medium Low':4,'Medium':7,'Medium High':10,'High':15};
var WEATHER={};

// ===== 回归预测引擎 =====
function getHolidayInfo(dStr){return HOLIDAY[dStr]||{hh:0,hc:0,wh:0,wc:0,act:0};}
function getRain(dStr){return WEATHER[dStr]!==undefined?WEATHER[dStr]:0;}

function predBase(dates){
  var r={};
  dates.forEach(function(dStr){
    var h=getHolidayInfo(dStr),rain=getRain(dStr);
    var hkOut=263590+56063+(h.wh?80419:0)+(h.hh?50544:0)-515*rain;
    var hkIn=252137+56889+(h.wh?110882:0)+(h.hh?103533:0)-513*rain;
    var l7d=new Date(dStr);l7d.setDate(l7d.getDate()-7);
    var l7in=(DATA[dts(l7d)]&&DATA[dts(l7d)].inbound)?DATA[dts(l7d)].inbound.mainland:0;
    var cnOut=61377+16126+(h.wc?26565:0)+(h.hc?55577:0)-136*rain+(h.act?7842:0)+0.23*l7in;
    var cnIn=82112+21742+(h.wc?28343:0)+(h.hc?51793:0)-131*rain+(h.act?17820:0);
    r[dStr]={hkOut:hkOut,hkIn:hkIn,cnOut:cnOut,cnIn:cnIn};
  });
  return r;
}

function predCascade(dates){
  var s1={};
  dates.forEach(function(dStr){
    var h=getHolidayInfo(dStr),rain=getRain(dStr);
    s1[dStr]={hkOut:263590+56063+(h.wh?80419:0)+(h.hh?50544:0)-515*rain,cnIn:82112+21742+(h.wc?28343:0)+(h.hc?51793:0)-131*rain+(h.act?17820:0)};
  });
  var r={};
  dates.forEach(function(dStr,i){
    var h=getHolidayInfo(dStr),rain=getRain(dStr);
    var l1=(i>=1)?s1[dates[i-1]].hkOut:(DATA[dates[i-1]]&&DATA[dates[i-1]].outbound?DATA[dates[i-1]].outbound.hk:0);
    var l2=(i>=2)?s1[dates[i-2]].hkOut:((i>=1&&DATA[dates[i-2]]&&DATA[dates[i-2]].outbound)?DATA[dates[i-2]].outbound.hk:0);
    var l3=(i>=3)?s1[dates[i-3]].hkOut:((i>=1&&DATA[dates[i-3]]&&DATA[dates[i-3]].outbound)?DATA[dates[i-3]].outbound.hk:0);
    var hkIn=103619+26307+(h.wh?78159:0)+(h.hh?39277:0)-448*rain+0.34*l1+0.16*l2+0.09*l3;
    var cl1=(i>=1)?s1[dates[i-1]].cnIn:(DATA[dates[i-1]]&&DATA[dates[i-1]].inbound?DATA[dates[i-1]].inbound.mainland:0);
    var cl5=(i>=5)?s1[dates[i-5]].cnIn:((i>=1&&DATA[dates[i-5]]&&DATA[dates[i-5]].inbound)?DATA[dates[i-5]].inbound.mainland:0);
    var cl7=(i>=7)?s1[dates[i-7]].cnIn:((i>=1&&DATA[dates[i-7]]&&DATA[dates[i-7]].inbound)?DATA[dates[i-7]].inbound.mainland:0);
    var cnOut=12902+(h.hc?21405:0)+(h.wc?20571:0)-112*rain+(h.act?7781:0)+0.60*cl1+0.11*cl5+0.08*cl7;
    r[dStr]={hkOut:s1[dStr].hkOut,hkIn:hkIn,cnOut:cnOut,cnIn:s1[dStr].cnIn};
  });
  return r;
}

function genPredict(){
  var today=new Date();
  var day=today.getDay(),diff=today.getDate()-day+(day===0?-6:1);
  var thisWeekMon=new Date(today);thisWeekMon.setDate(diff);
  var nextWeekMon=new Date(thisWeekMon);nextWeekMon.setDate(thisWeekMon.getDate()+7);
  
  var thisWeekStart=new Date(thisWeekMon);
  var thisWeekEnd=new Date(thisWeekMon);thisWeekEnd.setDate(thisWeekMon.getDate()+6);
  var nextWeekStart=new Date(nextWeekMon);
  var nextWeekEnd=new Date(nextWeekMon);nextWeekEnd.setDate(nextWeekMon.getDate()+6);
  
  var lyThisWeekStart=new Date(thisWeekStart);lyThisWeekStart.setFullYear(thisWeekStart.getFullYear()-1);
  var lyLastWeekStart=new Date(lyThisWeekStart);lyLastWeekStart.setDate(lyThisWeekStart.getDate()-7);
  var lyNextWeekStart=new Date(lyThisWeekStart);lyNextWeekStart.setDate(lyThisWeekStart.getDate()+7);
  
  function getWeekData(startDate){
    var dates=[];
    for(var i=0;i<7;i++){var d=new Date(startDate);d.setDate(startDate.getDate()+i);dates.push(dts(d));}
    return weekStats(dates);
  }
  
  var lastWeekStart=new Date(thisWeekMon);lastWeekStart.setDate(thisWeekMon.getDate()-7);
  var weekMinus2=new Date(thisWeekMon);weekMinus2.setDate(thisWeekMon.getDate()-14);
  var weekMinus3=new Date(thisWeekMon);weekMinus3.setDate(thisWeekMon.getDate()-21);
  var weekMinus4=new Date(thisWeekMon);weekMinus4.setDate(thisWeekMon.getDate()-28);
  
  var sLastWeek=getWeekData(lastWeekStart);
  var sWeekM2=getWeekData(weekMinus2);
  var sWeekM3=getWeekData(weekMinus3);
  var sWeekM4=getWeekData(weekMinus4);
  
  var lyThisWeek=getWeekData(lyThisWeekStart);
  var lyLastWeek=getWeekData(lyLastWeekStart);
  var lyNextWeek=getWeekData(lyNextWeekStart);
  
  var cats=[{key:'total',name:'整体'},{key:'hk',name:'香港居民'},{key:'mainland',name:'内地旅客'},{key:'other',name:'外国旅客'}];
  
  function predictWeek(weekType){
    var results=[];
    var notes=[];
    
    cats.forEach(function(cat){
      if(cat.key==='total'){
        var lastWeekIn=avg(sLastWeek.inbound.total);
        var lastWeekOut=avg(sLastWeek.outbound.total);
        var weekM2In=avg(sWeekM2.inbound.total);
        var weekM2Out=avg(sWeekM2.outbound.total);
        var weekM3In=avg(sWeekM3.inbound.total);
        var weekM3Out=avg(sWeekM3.outbound.total);
        var weekM4In=avg(sWeekM4.inbound.total);
        var weekM4Out=avg(sWeekM4.outbound.total);
        var lyThisIn=avg(lyThisWeek.inbound.total);
        var lyThisOut=avg(lyThisWeek.outbound.total);
        var lyLastIn=avg(lyLastWeek.inbound.total);
        var lyLastOut=avg(lyLastWeek.outbound.total);
        var lyNextIn=avg(lyNextWeek.inbound.total);
        var lyNextOut=avg(lyNextWeek.outbound.total);
      }else{
        var lastWeekIn=avg(sLastWeek.inbound[cat.key]);
        var lastWeekOut=avg(sLastWeek.outbound[cat.key]);
        var weekM2In=avg(sWeekM2.inbound[cat.key]);
        var weekM2Out=avg(sWeekM2.outbound[cat.key]);
        var weekM3In=avg(sWeekM3.inbound[cat.key]);
        var weekM3Out=avg(sWeekM3.outbound[cat.key]);
        var weekM4In=avg(sWeekM4.inbound[cat.key]);
        var weekM4Out=avg(sWeekM4.outbound[cat.key]);
        var lyThisIn=avg(lyThisWeek.inbound[cat.key]);
        var lyThisOut=avg(lyThisWeek.outbound[cat.key]);
        var lyLastIn=avg(lyLastWeek.inbound[cat.key]);
        var lyLastOut=avg(lyLastWeek.outbound[cat.key]);
        var lyNextIn=avg(lyNextWeek.inbound[cat.key]);
        var lyNextOut=avg(lyNextWeek.outbound[cat.key]);
      }
      
      var lyIn=weekType==='本周'?lyThisIn:lyNextIn;
      var lyOut=weekType==='本周'?lyThisOut:lyNextOut;
      var lyPrevIn=weekType==='本周'?lyLastIn:lyThisIn;
      var lyPrevOut=weekType==='本周'?lyLastOut:lyThisOut;
      
      var lyChgIn=(lyIn-lyPrevIn)/lyPrevIn;
      var lyChgOut=(lyOut-lyPrevOut)/lyPrevOut;
      var baseIn=lastWeekIn*(1+lyChgIn);
      var baseOut=lastWeekOut*(1+lyChgOut);
      
      var avg4In=(weekM2In+weekM3In+weekM4In)/3;
      var avg4Out=(weekM2Out+weekM3Out+weekM4Out)/3;
      
      var devIn=(lastWeekIn-avg4In)/avg4In;
      var devOut=(lastWeekOut-avg4Out)/avg4Out;
      
      var finalIn=baseIn,finalOut=baseOut;
      var beta=0.6;
      var note='';
      
      if(devOut>0.10){
        finalIn=baseIn*(1+beta*devOut);
        finalOut=baseOut*(1-beta*devOut);
        note=cat.name+'：出境偏离率'+fmtP(devOut*100)+'，触发修正';
      }else if(devIn>0.10){
        finalOut=baseOut*(1+beta*devIn);
        note=cat.name+'：入境偏离率'+fmtP(devIn*100)+'，触发修正';
      }
      
      var chgIn=(finalIn-lastWeekIn)/lastWeekIn*100;
      var chgOut=(finalOut-lastWeekOut)/lastWeekOut*100;
      
      results.push({
        name:cat.name,
        outPred:finalOut,
        outChg:chgOut,
        inPred:finalIn,
        inChg:chgIn
      });
      
      if(note)notes.push(note);
    });
    
    return{results:results,notes:notes};
  }
  
  function genPredTable(title,startDate,endDate,predData){
    var h='<div class="section"><h3>'+title+' ('+dts(startDate)+' 至 '+dts(endDate)+')</h3><table><thead><tr><th>人群</th><th>预测出境人数(万)</th><th>出境环比</th><th>预测入境人数(万)</th><th>入境环比</th></tr></thead><tbody>';
    predData.results.forEach(function(r){
      h+='<tr><td style="text-align:left;">'+r.name+'</td><td>'+fmtN(r.outPred)+'</td><td class="'+clsC(r.outChg)+'">'+fmtP(r.outChg)+'</td><td>'+fmtN(r.inPred)+'</td><td class="'+clsC(r.inChg)+'">'+fmtP(r.inChg)+'</td></tr>';
    });
    h+='</tbody></table>';
    if(predData.notes.length>0){
      h+='<p style="margin-top:10px;font-size:12px;color:#666;">📋 修正说明：'+predData.notes.join('；')+'</p>';
    }else{
      h+='<p style="margin-top:10px;font-size:12px;color:#666;">📋 上周数据无异常偏离，未触发修正</p>';
    }
    h+='</div>';
    return h;
  }
  
  var thisWeekPred=predictWeek('本周');
  var nextWeekPred=predictWeek('下周');
  
 var html='<div style="text-align:center;margin:30px 0;"><h2 style="font-size:20px;font-weight:bold;color:#2c3e50;display:inline-block;white-space:nowrap;">————————— 客流预测（参考去年趋势+4周偏离） ——————————</h2></div>';

  // 构建本周/下周日期数组
  var thisWeekDates=[];
  for(var i=0;i<7;i++){var d=new Date(thisWeekStart);d.setDate(thisWeekStart.getDate()+i);thisWeekDates.push(dts(d));}
  var nextWeekDates=[];
  for(var i=0;i<7;i++){var d=new Date(nextWeekStart);d.setDate(nextWeekStart.getDate()+i);nextWeekDates.push(dts(d));}

  // 回归预测
  var baseThis=predBase(thisWeekDates),baseNext=predBase(nextWeekDates);
  var cascThis=predCascade(thisWeekDates),cascNext=predCascade(nextWeekDates);

  var lwReal={hkOut:avg(sLastWeek.outbound.hk),hkIn:avg(sLastWeek.inbound.hk),cnOut:avg(sLastWeek.outbound.mainland),cnIn:avg(sLastWeek.inbound.mainland)};

  function avgPred(predObj,field){var s=0,c=0;for(var k in predObj){s+=predObj[k][field];c++;}return c?s/c:0;}

  function genRegTable(label,dates,predObj,isCascade){
    var start=dts(new Date(dates[0])),end=dts(new Date(dates[dates.length-1]));
    var h='<div class="section"><h3>'+label+' ('+start+' 至 '+end+') <span style="font-size:12px;color:#888;">｜R²: '+(isCascade?'A0.30/B0.61/C0.79/D0.42':'A0.30/B0.49/C0.54/D0.42')+'</span></h3>';
    h+='<table><thead><tr><th>人群</th><th>预测出境日均(万)</th><th>出境环比</th><th>预测入境日均(万)</th><th>入境环比</th></tr></thead><tbody>';
    var rows=[
      {name:'整体',out:avgPred(predObj,'hkOut')+avgPred(predObj,'cnOut'),in:avgPred(predObj,'hkIn')+avgPred(predObj,'cnIn'),oprev:lwReal.hkOut+lwReal.cnOut,iprev:lwReal.hkIn+lwReal.cnIn},
      {name:'香港居民',out:avgPred(predObj,'hkOut'),in:avgPred(predObj,'hkIn'),oprev:lwReal.hkOut,iprev:lwReal.hkIn},
      {name:'内地旅客',out:avgPred(predObj,'cnOut'),in:avgPred(predObj,'cnIn'),oprev:lwReal.cnOut,iprev:lwReal.cnIn},
      {name:'外国旅客',out:0,in:0,oprev:0,iprev:0}
    ];
    rows.forEach(function(rw){
      var oc=rw.oprev?((rw.out-rw.oprev)/rw.oprev*100):0;
      var ic=rw.iprev?((rw.in-rw.iprev)/rw.iprev*100):0;
      h+='<tr><td style="text-align:left;">'+rw.name+'</td>';
      if(rw.name==='外国旅客'){h+='<td>—</td><td>—</td><td>—</td><td>—</td>';}
      else{h+='<td>'+fmtN(rw.out)+'</td><td class="'+clsC(oc)+'">'+fmtP(oc)+'</td><td>'+fmtN(rw.in)+'</td><td class="'+clsC(ic)+'">'+fmtP(ic)+'</td>';}
      h+='</tr>';
    });
    h+='</tbody></table>';
    h+='<p style="margin-top:6px;font-size:11px;color:#888;">'+(isCascade?'🔄 级联：A/D先算 → 滞后项级联 → B(L1/L2/L3)+C(L1/L5/L7)':'📐 基础回归：无级联，C仅L7(永真实数据)，B无滞后')+'</p></div>';
    return h;
  }

  var html='';
  // 方法一
  html+='<div style="text-align:center;margin:30px 0;padding:15px;background:#f0f4ff;border-radius:8px;"><h2 style="font-size:18px;font-weight:bold;color:#2c3e50;">————————— 方法一：客流预测（参考去年趋势+4周偏离） ——————————</h2><p style="font-size:11px;color:#888;margin-top:2px;">旧方法 — 去年同期周环比 × 上周实际 + 近4周偏离修正</p></div>';
  html+=genPredTable('本周预测',thisWeekStart,thisWeekEnd,thisWeekPred);
  html+=genPredTable('下周预测',nextWeekStart,nextWeekEnd,nextWeekPred);

  // 方法二
  html+='<div style="text-align:center;margin:30px 0;padding:15px;background:#f5fff0;border-radius:8px;"><h2 style="font-size:18px;font-weight:bold;color:#1e8449;">————————— 方法二：基础回归预测 ——————————</h2><p style="font-size:11px;color:#888;margin-top:2px;">4个OLS回归公式，无滞后级联，输入：雨量+周末+假期+活动+年份</p></div>';
  html+=genRegTable('本周预测',thisWeekDates,baseThis,false);
  html+=genRegTable('下周预测',nextWeekDates,baseNext,false);

  // 方法三
  html+='<div style="text-align:center;margin:30px 0;padding:15px;background:#fff8f0;border-radius:8px;"><h2 style="font-size:18px;font-weight:bold;color:#e67e22;">————————— 方法三：级联回归预测（最优R²） ——————————</h2><p style="font-size:11px;color:#888;margin-top:2px;">A/D先算 → 滞后项级联 → B(0.61)+C(0.79)，R²最高</p></div>';
  html+=genRegTable('本周预测',thisWeekDates,cascThis,true);
  html+=genRegTable('下周预测',nextWeekDates,cascNext,true);

  // 天气状态
  var wkeys=Object.keys(WEATHER);
  if(wkeys.length>0){
    html+='<div class="section"><p style="font-size:12px;color:#3498db;">🌧 天气源：香港天文台9天预报（';
    wkeys.sort().slice(0,9).forEach(function(k){html+=k+':'+WEATHER[k]+'mm ';});
    html+='）</p></div>';
  }else{
    html+='<div class="section"><p style="font-size:12px;color:#e74c3c;">⚠️ 天气数据加载中，回归预测中雨量默认=1mm（无雨Low）</p></div>';
  }
  html+='<div class="section"><p style="color:#e74c3c;font-size:12px;">⚠️ 预测基于历史数据推算，仅供参考；级联版误差逐日累积，远日期偏差较大</p></div>';

  // 异步加载天气后自动刷新
  fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=en')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.weatherForecast){
        var changed=false;
        d.weatherForecast.forEach(function(f){
          var dd=f.forecastDate.substr(0,4)+'-'+f.forecastDate.substr(4,2)+'-'+f.forecastDate.substr(6,2);
          var mm=PSR_MM[f.PSR]||1;
          if(WEATHER[dd]!==mm){WEATHER[dd]=mm;changed=true;}
        });
        if(changed){showPage('prediction');}
      }
    })
    .catch(function(){});

  return html;
}

function showPage(p){
  var bs=document.querySelectorAll('nav button');bs.forEach(function(b){b.classList.remove('active')});event.target.classList.add('active');
  var c=document.getElementById('content');
  if(p==='current')c.innerHTML=genReport();
  else if(p==='history')c.innerHTML=genHistory();
  else c.innerHTML=genPredict();
}


</script>
