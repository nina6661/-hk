.controls{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap;align-items:center}

// 工具函数
function fmtD(s){var d=new Date(s);return(d.getMonth()+1)+'/'+d.getDate()}
function fmtFD(s){var d=new Date(s);return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')}
function fmtN(n){return(n/10000).toFixed(1)}
function fmtP(n){return(n>0?'+':'')+n.toFixed(2)+'%'}
function clsC(n){return n>0?'positive':n<0?'negative':'neutral'}
function dts(d){var y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();return y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0')}
function avg(a){if(!a||!a.length)return 0;var s=0;for(var i=0;i<a.length;i++)s+=a[i];return s/a.length}
function chg(c,p){
  if(!p||p===0)return 0;
  return(c-p)/p*100;
}

// 计算指定年份ISO周的平均值
function calcWeekAvg(year, week, cat, dir){
  var mon = getISOWeekMonday(year, week);
  var dates = [];
  for(var i=0;i<7;i++){
    var d = new Date(mon);
    d.setDate(d.getDate() + i);
    dates.push(dts(d));
  }
  var total = 0, count = 0;
  dates.forEach(function(d){
    if(DATA[d] && DATA[d][dir] && DATA[d][dir][cat] !== undefined){
      total += DATA[d][dir][cat];
      count++;
    }
  });
  return count > 0 ? total / count : 0;
}

// 计算指定年的周对比：本周 vs 上周
function calcWeekChg(year, week, cat, dir){
  var currentAvg = calcWeekAvg(year, week, cat, dir);
  // 对比上周（同一年度内的上周）
  var prevWeek = week - 1;
  var prevYear = year;
  if(prevWeek < 1){
    prevYear = year - 1;
    prevWeek = 52;
  }
  var prevAvg = calcWeekAvg(prevYear, prevWeek, cat, dir);
  return chg(currentAvg, prevAvg);
}

// 获取指定年月的ISO周数
function getISOWeekNum(dateStr){
  var d=new Date(dateStr);
  var year=d.getFullYear();
  var jan4=new Date(year,0,4);
  var jan4Day=jan4.getDay()||7;
  var week1Monday=new Date(jan4);week1Monday.setDate(jan4.getDate()-(jan4Day-1));
  var days=Math.floor((d-week1Monday)/(86400000*7));
  return days+1;
}

// 获取某年某ISO周的对应对周（上周）
function getPrevISOWeek(year,week){
  if(week<=1){year--;week=52;}
  else{week--;}
  return{year:year,week:week};
}

function weekRange(dt){
  var d=new Date(dt),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  var mon=new Date(d.setDate(diff)),sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{start:mon,end:sun}
}

// 获取ISO周数（与Python一致）
function getISOWeek(dateStr){
  var d=new Date(dateStr);
  var dayNum = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - dayNum);
  var yearStart = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// 根据ISO年和周数获取周一日期（修正版）
function getISOWeekMonday(year, week) {
  // 1月4日一定在第1周
  var jan4 = new Date(year, 0, 4);
  // 1月4日所在周的周一
  var jan4Day = jan4.getDay() || 7;
  var week1Monday = new Date(jan4);
  week1Monday.setDate(jan4.getDate() - (jan4Day - 1));
  // 目标周的周一
  var targetMonday = new Date(week1Monday);
  targetMonday.setDate(week1Monday.getDate() + (week - 1) * 7);
  return targetMonday;
}

function weekDates(sd){
  var r=[],d=new Date(sd);
  for(var i=0;i<7;i++){var t=new Date(d);t.setDate(d.getDate()+i);r.push(dts(t))}
  return r
}

function weekStats(dates){
  var s={inbound:{hk:[],mainland:[],other:[],total:[]},outbound:{hk:[],mainland:[],other:[],total:[]}};
  dates.forEach(function(d){
    if(DATA[d]){
      var day=DATA[d];
      ['inbound','outbound'].forEach(function(dir){
        if(day[dir]){
          s[dir].hk.push(day[dir].hk||0);
          s[dir].mainland.push(day[dir].mainland||0);
          s[dir].other.push(day[dir].other||0);
          s[dir].total.push(day[dir].total||0)
        }
      })
    }
  });
  return s
}

// 为指定周生成完整报表（用于历史查询）
function genReportForWeek(wk){
  var dates0=weekDates(dts(wk.start));
  
  // T-1, T-2, T-3周
  var d1=new Date(wk.start);d1.setDate(d1.getDate()-7);
  var dates1=weekDates(dts(d1));
  var d2=new Date(d1);d2.setDate(d2.getDate()-7);
  var dates2=weekDates(dts(d2));
  var d3=new Date(d2);d3.setDate(d3.getDate()-7);
  var dates3=weekDates(dts(d3));
  
  // 上年同期ISO周对齐
  var isoWk=getISOWeek(dts(wk.start));
  var lastYear=wk.start.getFullYear()-1;
  var lyMon=getISOWeekMonday(lastYear,isoWk);
  var lyDates=weekDates(dts(lyMon));
  var lyPrev=new Date(lyMon);lyPrev.setDate(lyPrev.getDate()-7);
  var lyPrevDates=weekDates(dts(lyPrev));
  var lyNext1=new Date(lyMon);lyNext1.setDate(lyNext1.getDate()+7);
  var lyDates1=weekDates(dts(lyNext1));
  var lyNext2=new Date(lyNext1);lyNext2.setDate(lyNext2.getDate()+7);
  var lyDates2=weekDates(dts(lyNext2));
  var lyNext3=new Date(lyNext2);lyNext3.setDate(lyNext3.getDate()+7);
  var lyDates3=weekDates(dts(lyNext3));
  
  var s0=weekStats(dates0),s1=weekStats(dates1),s2=weekStats(dates2),s3=weekStats(dates3);
  var ls=weekStats(lyDates),lps=weekStats(lyPrevDates),ls1=weekStats(lyDates1),ls2=weekStats(lyDates2),ls3=weekStats(lyDates3);
  
  var cats=['hk','mainland','other'];
  var catN={hk:'港人',mainland:'内地旅客',other:'外国旅客'};
  
  var h='<div class="section"><h3>出入境旅客流量统计表 ('+dts(wk.start)+' 至 '+dts(wk.end)+')</h3>';
  h+='<table><thead><tr><th>类别</th><th>上周日均(万)</th><th>周对比</th>';
  dates0.forEach(function(d){h+='<th>'+fmtFD(d)+'</th>'});
  h+='<th>T0周<br>'+fmtFD(wk.start)+'</th><th>T-1周<br>'+fmtFD(d1)+'</th><th>T-2周<br>'+fmtFD(d2)+'</th><th>T-3周<br>'+fmtFD(d3)+'</th></tr></thead><tbody>';
  
  var thisYear=wk.start.getFullYear();
  var thisWeek=getISOWeek(dts(wk.start));
  
  ['inbound','outbound'].forEach(function(dir){
    var dn=dir==='inbound'?'南下':'北上';
    var tn=dir==='inbound'?'入境合计':'出境合计';
    
    cats.forEach(function(cat){
      var a0=avg(s0[dir][cat]),a1=avg(s1[dir][cat]);
      var c=calcWeekChg(thisYear,thisWeek,cat,dir);
      h+='<tr><td>'+catN[cat]+dn+'</td><td>'+fmtN(a0)+'</td><td class="'+clsC(c)+'">'+fmtP(c)+'</td>';
      dates0.forEach(function(d,i){
        var v=s0[dir][cat][i]||0;
        var pv=s1[dir][cat][i]||0;
        var dc=chg(v,pv);
        h+='<td>'+fmtN(v)+'<span class="sub-text '+clsC(dc)+'">'+fmtP(dc)+'</span></td>';
      });
      h+='<td>'+fmtN(a0)+'</td><td>'+fmtN(a1)+'</td><td>'+fmtN(avg(s2[dir][cat]))+'</td><td>'+fmtN(avg(s3[dir][cat]))+'</td></tr>';
    });
    
    var ta0=avg(s0[dir].total),ta1=avg(s1[dir].total);
    var tc=calcWeekChg(thisYear,thisWeek,'total',dir);
    h+='<tr class="total-row"><td><strong>'+tn+'</strong></td><td><strong>'+fmtN(ta0)+'</strong></td><td class="'+clsC(tc)+'"><strong>'+fmtP(tc)+'</strong></td>';
    dates0.forEach(function(d,i){
      var v=s0[dir].total[i]||0;
      var pv=s1[dir].total[i]||0;
      var dc=chg(v,pv);
      h+='<td><strong>'+fmtN(v)+'</strong><span class="sub-text '+clsC(dc)+'">'+fmtP(dc)+'</span></td>';
    });
    h+='<td><strong>'+fmtN(ta0)+'</strong></td><td><strong>'+fmtN(ta1)+'</strong></td><td><strong>'+fmtN(avg(s2[dir].total))+'</strong></td><td><strong>'+fmtN(avg(s3[dir].total))+'</strong></td></tr>';
  });
  
  h+='<tr class="separator-row"><td colspan="14"></td></tr>';
  h+='<thead><tr><th colspan="14" style="text-align:center;background:#34495e;font-size:14px">去年同期（ISO周对齐：'+dts(lyMon)+' 至 '+dts(new Date(lyMon.getTime()+6*86400000))+'）</th></tr></thead>';
  h+='<thead><tr><th>类别</th><th>当周日均(万)</th><th>同比</th>';
  lyDates.forEach(function(d){h+='<th>'+fmtFD(d)+'</th>'});
  h+='<th>当前周日均</th><th>T+1周<br>'+fmtFD(lyNext1)+'</th><th>T+2周<br>'+fmtFD(lyNext2)+'</th><th>T+3周<br>'+fmtFD(lyNext3)+'</th></tr></thead><tbody>';
  
  ['inbound','outbound'].forEach(function(dir){
    var dn=dir==='inbound'?'南下':'北上';
    var tn=dir==='inbound'?'入境合计':'出境合计';
    
    cats.forEach(function(cat){
      var la=avg(ls[dir][cat]),lpa=avg(lps[dir][cat]);
      var currAvg=calcWeekAvg(thisYear,thisWeek,cat,dir);var lyAvg=calcWeekAvg(lyYear,lyWeek,cat,dir);var lc=chg(currAvg,lyAvg);
      h+='<tr style="color:#7f8c8d"><td>'+catN[cat]+dn+'</td><td>'+fmtN(la)+'</td><td class="'+clsC(lc)+'">'+fmtP(lc)+'</td>';
      lyDates.forEach(function(d,i){h+='<td>'+fmtN(ls[dir][cat][i]||0)+'</td>';});
      h+='<td>'+fmtN(la)+'</td><td>'+fmtN(avg(ls1[dir][cat]))+'</td><td>'+fmtN(avg(ls2[dir][cat]))+'</td><td>'+fmtN(avg(ls3[dir][cat]))+'</td></tr>';
    });
    
    var lta=avg(ls[dir].total),ltpa=avg(lps[dir].total);
    var currTotalAvg=calcWeekAvg(thisYear,thisWeek,'total',dir);var lyTotalAvg=calcWeekAvg(lyYear,lyWeek,'total',dir);var ltc=chg(currTotalAvg,lyTotalAvg);
    h+='<tr class="total-row" style="color:#7f8c8d"><td><strong>'+tn+'</strong></td><td><strong>'+fmtN(lta)+'</strong></td><td class="'+clsC(ltc)+'"><strong>'+fmtP(ltc)+'</strong></td>';
    lyDates.forEach(function(d,i){h+='<td><strong>'+fmtN(ls[dir].total[i]||0)+'</strong></td>';});
    h+='<td><strong>'+fmtN(lta)+'</strong></td><td><strong>'+fmtN(avg(ls1[dir].total))+'</strong></td><td><strong>'+fmtN(avg(ls2[dir].total))+'</strong></td><td><strong>'+fmtN(avg(ls3[dir].total))+'</strong></td></tr>';
  });
  
  h+='</tbody></table></div>';
  
  // 图表
  h+='<div class="section"><h3>年度对比趋势图</h3><div class="charts-row"><div class="chart-box"><h4>入境情况</h4><div id="ci" class="chart"></div></div></div><div class="charts-row"><div class="chart-box"><h4>出境情况</h4><div id="co" class="chart"></div></div></div></div>';
  h+='<div class="section"><h3>细节趋势图（近6周）</h3><div class="charts-row"><div class="chart-box"><h4>入境细节</h4><div id="cid" class="chart"></div></div></div><div class="charts-row"><div class="chart-box"><h4>出境细节</h4><div id="cod" class="chart"></div></div></div></div>';
  
  // 小抄
  var ia=avg(s0.inbound.total),oa=avg(s0.outbound.total),ta=ia+oa;
  var ic=chg(ia,avg(s1.inbound.total)),oc=chg(oa,avg(s1.outbound.total));

  h+='<div class="section"><h3>周度数据汇报小抄</h3><div id="summary">出入境日均是 '+fmtN(ta)+' 万，整体'+((ic+oc)>0?'上升':'下降')+'\n\n一、入境（上周日均 '+fmtN(ia)+' 万，'+fmtP(ic)+'）\n港人南下：'+fmtN(iha)+' 万，周环比 '+fmtP(ihc)+'\n内地旅客南下：'+fmtN(ima)+' 万，周环比 '+fmtP(imc)+'\n\n二、出境（上周日均 '+fmtN(oa)+' 万，周环比 '+fmtP(oc)+'）\n港人北上：'+fmtN(oha)+' 万，周环比 '+fmtP(ohc)+'\n内地旅客北上：'+fmtN(oma)+' 万，周环比 '+fmtP(omc)+'</div></div>';
  
  return h;
}

}

function qRange(){
  var s=document.getElementById('sd').value,e=document.getElementById('ed').value;
  if(!s||!e){alert('请选择日期');return}
  var dates=[],d=new Date(s),ed=new Date(e);
  while(d<=ed){dates.push(dts(d));d.setDate(d.getDate()+1)}
  var st=weekStats(dates);
  document.getElementById('hr').innerHTML='<div class="section"><h3>查询结果 ('+s+' 至 '+e+')</h3><table><thead><tr><th>指标</th><th>入境(万)</th><th>出境(万)</th></tr></thead><tbody><tr><td>日均总流量</td><td>'+fmtN(avg(st.inbound.total))+'</td><td>'+fmtN(avg(st.outbound.total))+'</td></tr><tr><td>港人日均</td><td>'+fmtN(avg(st.inbound.hk))+'</td><td>'+fmtN(avg(st.outbound.hk))+'</td></tr><tr><td>内地旅客日均</td><td>'+fmtN(avg(st.inbound.mainland))+'</td><td>'+fmtN(avg(st.outbound.mainland))+'</td></tr><tr><td>外国旅客日均</td><td>'+fmtN(avg(st.inbound.other))+'</td><td>'+fmtN(avg(st.outbound.other))+'</td></tr></tbody></table></div>';
}

function genPredict(){
  var al=Object.keys(DATA).sort(),rc=al.slice(-30),it=0,ot=0;
  rc.forEach(function(d){if(DATA[d]){it+=DATA[d].inbound?.total||0;ot+=DATA[d].outbound?.total||0}});
  var ia=it/rc.length,oa=ot/rc.length;
  return '<div class="section"><h3>客流趋势预测</h3><p style="margin-bottom:20px">基于最近30天数据移动平均：</p><table><thead><tr><th>预测天数</th><th>入境(万)</th><th>出境(万)</th></tr></thead><tbody><tr><td>7天</td><td>'+fmtN(ia)+'</td><td>'+fmtN(oa)+'</td></tr><tr><td>14天</td><td>'+fmtN(ia)+'</td><td>'+fmtN(oa)+'</td></tr><tr><td>30天</td><td>'+fmtN(ia)+'</td><td>'+fmtN(oa)+'</td></tr></tbody></table><p style="margin-top:20px;color:#e74c3c">⚠️ 预测仅供参考</p></div>';
}

function showPage(p){
  var bs=document.querySelectorAll('nav button');bs.forEach(function(b){b.classList.remove('active')});event.target.classList.add('active');
  var c=document.getElementById('content');
  if(p==='current')c.innerHTML=genReport();
  else if(p==='history')c.innerHTML=genHistory();
  else c.innerHTML=genPredict();
}

document.addEventListener('DOMContentLoaded',function(){document.getElementById('content').innerHTML=genReport()});
</script>
</body>
</html>
